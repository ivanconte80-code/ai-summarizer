<!DOCTYPE html>
<html>
<head>
<title>AI Summarizer</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:#f5f7fb;
}

.container-box{
    background:white;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.result-box{
    background:#f1f3f6;
    padding:20px;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="container mt-5">

<div class="text-center mb-4">
<h1>🤖 AI Text Summarizer</h1>
<p class="text-muted">Insert a long text and get a quick summary powered by AI</p>
</div>

<div class="container-box">

<form method="POST">

<div class="mb-3">

<label class="form-label">Insert your text</label>

<textarea 
class="form-control" 
name="testo" 
rows="8"
placeholder="Paste your text here...">
</textarea>

</div>

<button class="btn btn-primary w-100">
Summarize Text
</button>

</form>

</div>


{% if risultato %}

<div class="container-box mt-4">

<h4>Summary</h4>

<div class="result-box mt-3">

{{ risultato }}

</div>

</div>

{% endif %}

</div>

</body>
</html>
